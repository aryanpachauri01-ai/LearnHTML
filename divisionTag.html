<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Division Tag</title>
</head>
<body style="background-color: black;">
  <!--div tag is used for wrapping/container-->
  <!--Whatever change you make in this would be applied to everything in it-->
  <div style="background-color: cyan;">
    <article>
      <ul>
        <li>
          Item 1
        </li>
        <li>
          Item 2
        </li>
      </ul>
    </article>
  </div>
  <!--Block elements always come in next line by default the occupy all space from left to right
  From above div we can see that div takes entire line so it is a block element
  Similarly para tag is a block tag-->

  <span style="background-color: red">This is a span tag</span>
   <span style="background-color: red">This is second span tag</span>
<!--In line elements don't come in next line, the next text starts from same line onwards, they occupy only that amount of space according to their content
From the above example, we can see that only that much amount of space was covered as much text was in span tag and next span tag starts from same line-->

</body>
</html>
