<!DOCTYPE html>
<html>
<head>
  <title>Lists</title>
  </head>
  <body>
  <h1>This is an unordered list</h1>
  <hr>
    <ul> <!--used to creat an unordered list -->
      <li>item 1</li><!--li is list item-->
      <li>item 2</li>
      <li>item 3</li>
      <li>item 4</li>
      </ul>
      <hr>
      <ol><!--unordered list-->
        <li>item 1</li><!--list item-->
        <li>item 2</li>
      </ol>
      <hr>
    <table><!--creates a table-->
      <tr><!--table row , this creates a row in table-->
      <!--all the things below would be stripped in this row-->
        <td>roll no.</td><!--table data, this would be written in a cell of the table-->
        <td>name</td><!--this would be written in the next cell of row-->
      </tr>
      <tr>
        <!--This creates the next rule for this table-->
        <td>1</td>
        <td>Aryan</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Raj</td>
      </tr>
    </table>

  </body>
