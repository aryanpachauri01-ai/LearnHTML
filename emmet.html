<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Emmet</title>
</head>
<body>
  <!--p then tab-->
  <p>Result</p>
  <!--p{text you want to enter in p} then tab-->
  <p>Result text</p>
  <!--p>p>p then tab makes para inside para inside para -->
  <p>
    <p>
      <p>Result</p>
    </p>
  </p>
  <!--h2+p then tab would make an heading then a Para after it ends-->
  <h2> Result</h2>
  <p>Result</p>
  <!-- For an id use use p#id_name then tab-->
  <p id="id_name"></p>
  <article id="id1"></article>
  <section id="name"></section>
  <!--To create a class, p.class_name then tab-->
  <p class="para"></p>
  <article class="dog"></article>
  <section class="dog cat lion"></section>
 <!-- ul>li*4 would create an unordered list with 4 list items -->
 <ul>
   <li>item 1</li>
   <li>item 2</li>
   <li>item 3</li>
   <li>item 4</li>
 </ul>
 <!--Same for table
 table>(tr>td*3)*2 
 created a table with 2 rows having 3 elements each-->
 <table>
   <tr>
     <td>a</td>
     <td>b</td>
     <td>c</td>
   </tr>
   <tr>
     <td>d</td>
     <td>e</td>
     <td>f</td>
   </tr>
 </table>
</body>
</html>
