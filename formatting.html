<!DOCTYPE html>
<html>
  <head>
    <title>Formatting</title>
  </head>
  <body>
    <p>This is a <b>paragraph</b> </p>
    <!--b is for bold  tag it prints the text inside it in bold -->
    <br>
    <p>This is a <strong>paragraph</strong> </p>
    <br>
    <!-- strong tag is similar to bold yah but if text to speech works then, the text inside it would be said boldly/highlighted-->
    <p>This is a <i>paragraph</i></p>
    <!--i is for italics tag -->
    <br>
    <!--Let's say we want to print 2⁵ we would use superscript tag-->
    <p> 2<sup>5</sup></p>
    <!--sup is for superscript tag whatever inside it is printed in power-->
    <br>
    <!--Now for subscript-->
    <p>NO<sub>2</sub></p>
    <!--sub is for subscript tag -->
    <br>
    <!--We can also use br tag in para -->
    <p>This is a <br>HTML file</p>
    <br>
    <pre>This
    is
    a
    paragraph
    and 
    this is a line in it</pre>
    <!--Whatever you write in pre tag gets printed as it is even if you change line inside it-->
  </body>
</html>
