<!DOCTYPE html>
<html>
<head>
  <title>Images</title>
</head>
<body>
  <img src="shrek.png" alt="This is a shrek image">
  <!--This inserts the image that is given first in src(meaning source ie from where it picks up image from) if not found it shows the text on alt-->
  <hr>
  <!--You can also use an image as a hyper link-->
  <a href="shrek.com" target=_blank title="this will Take you to shrek web page">
  <img src="shrek.png" alt="shrek">
    </a>
</body>
</html>
